services:
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: ogburger-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./api:/app
    environment:
      APP_NAME: ${APP_NAME:-ogburger}
      APP_ENV: ${APP_ENV:-development}
      TZ: ${TZ:-America/Bogota}

      # DB (PostgreSQL)
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-ogburger_db}
      DB_USER: ${POSTGRES_USER:-ogburger_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-ogburger_pass}

      # Seguridad / app
      SECRET_KEY: ${SECRET_KEY:-change_this_in_prod}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  web:
    image: nginx:alpine
    container_name: ogburger-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8081}:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

  db:
    image: postgres:16-alpine
    container_name: ogburger-db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      TZ: ${TZ:-America/Bogota}
      POSTGRES_DB: ${POSTGRES_DB:-ogburger_db}
      POSTGRES_USER: ${POSTGRES_USER:-ogburger_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ogburger_pass}
    volumes:
      - ./docker/db/data:/var/lib/postgresql/data
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ogburger_user} -d ${POSTGRES_DB:-ogburger_db}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  adminer:
    image: adminer:latest
    container_name: ogburger-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy